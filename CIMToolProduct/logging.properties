# =============================================================================
# CIMTool JUL Configuration
#
# java.util.logging (JUL) is bridged to SLF4J at startup via SLF4JBridgeHandler
# installed in CIMToolPlugin.configureLogging(). All JUL events flow through
# SLF4J -> Logback -> logs/cimtool.log as configured in logback.xml.
#
# This file is retained to ensure JUL does not pre-filter events before they
# reach the bridge. The FileHandler is intentionally absent -- Logback is the
# sole log output target.
#
# Changes take effect on the next restart -- no rebuild required.
# =============================================================================

# No handlers -- the SLF4JBridgeHandler is installed programmatically at startup
# and does not need to be declared here.
handlers=

# Pass all JUL events through to the bridge unfiltered. Logback's root level
# (configured in logback.xml) controls what is actually written to the log file.
.level=ALL

# =============================================================================
# Per-package overrides
# =============================================================================

# UCanAccess JDBC driver - suppress spurious "reserved word" warnings at the
# JUL level before they even reach the bridge.
net.ucanaccess.level=SEVERE

# HSQLDB - used internally by UCanAccess; suppress verbose output.
org.hsqldb.level=SEVERE
