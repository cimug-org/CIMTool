# =============================================================================
# CIMTool Logging Configuration
#
# This file is bundled inside the CIMTool plugin and automatically extracted
# to the installation root directory (alongside CIMTool.exe / CIMTool.ini) on
# first startup by CIMToolPlugin. Once extracted it is loaded via the
# -Djava.util.logging.config.file=./logging.properties JVM argument in
# CIMTool.ini on all subsequent startups.
#
# On the very first run (before extraction), UCanAccess and HSQLDB warning
# suppression is handled programmatically by CIMToolPlugin as a fallback.
#
# Location after extraction: installation root directory
# Changes take effect on the next restart - no rebuild required.
# =============================================================================

# Root logger level - controls the default for all loggers not listed below.
#
# Valid levels (most to least verbose): 
# ALL 
# FINEST 
# FINER 
# FINE 
# CONFIG 
# INFO 
# WARNING 
# SEVERE 
# OFF
#
.level=WARNING

# Route all logging to the rolling file handler only.
# Remove FileHandler and add ConsoleHandler here if console output is also desired.
# If output is desired to both then simply use the commented out line below instead
# and then logging will be routed to both. If both is desired then you will also
# need to add a line :
#    java.util.logging.ConsoleHandler.level=WARNING
#
handlers=java.util.logging.FileHandler
# handlers=java.util.logging.FileHandler, java.util.logging.ConsoleHandler

# =============================================================================
# Rolling file handler configuration
# =============================================================================

# Log file location - written to the logs/ subfolder under the installation root.
# %h is the user home directory. We use a relative path here so the logs folder
# sits alongside CIMTool.exe. The JVM resolves relative paths against the working
# directory, which for a launched Eclipse product is the installation root.
java.util.logging.FileHandler.pattern=logs/cimtool-%u-%g.log

# Maximum size of each log file before rotation (10 MB)
java.util.logging.FileHandler.limit=10485760

# Number of rotating log files to keep
java.util.logging.FileHandler.count=5

# Append to existing log file on restart rather than overwriting
java.util.logging.FileHandler.append=true

#
# Accept WARNING and above at the console handler level.
# Should be uncommented if the above handlers configuration
# enables java.util.logging.ConsoleHandler as well...
#
# java.util.logging.ConsoleHandler.level=WARNING

# Accept WARNING and above at the handler level
java.util.logging.FileHandler.level=WARNING

# Log format: timestamp, level, logger name, and message on one line
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$-7s [%3$s] %5$s%n

# =============================================================================
# Per-package overrides
# =============================================================================

# UCanAccess JDBC driver - suppress spurious "reserved word" warnings produced
# when reading Sparx EA .eap files. These are harmless driver noise.
net.ucanaccess.level=SEVERE

# HSQLDB - UCanAccess uses HSQLDB internally; suppress its verbose output too.
org.hsqldb.level=SEVERE